<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Meta Tags — theme-color y application-name se sobrescriben dinámicamente por SiteConfigContext -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mi Tienda" />
    <meta name="application-name" content="Mi Tienda" />
    <meta name="msapplication-TileColor" content="#16a34a" />
    
    <!-- Favicons — se sobrescriben dinámicamente por SiteConfigContext (branding_favicon) -->
    <link rel="icon" type="image/png" href="https://placehold.co/32x32/16a34a/ffffff?text=F" />
    <link rel="apple-touch-icon" href="https://placehold.co/180x180/16a34a/ffffff?text=F" />
    
    <!-- SEO: Meta tags dinámicos gestionados por applySEO() en seo.ts -->
    <meta name="author" content="Mi Tienda" />
    <meta name="description" content="Tienda online con membresías y beneficios exclusivos." />
    
    <!-- Geo Tags — sobrescritos dinámicamente por SiteConfigContext -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />
    
    <!-- Structured Data: schemas dinámicos inyectados por applySEO() y SiteConfigContext -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Google Font se inyecta dinámicamente por SiteConfigContext (branding_font) -->
    <!-- Title dinámico — sobrescrito por applySEO() en cada navegación -->
    <title>Mi Tienda</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
