<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#16a34a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="My Store" />
    <meta name="application-name" content="My Store" />
    <meta name="msapplication-TileColor" content="#16a34a" />
    <meta name="msapplication-config" content="/favicon/browserconfig.xml" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />
    
    <!-- SEO: Meta tags dinámicos gestionados por applySEO() en seo.ts -->
    <!-- Para bots sociales, .htaccess sirve páginas pre-renderizadas en /og/ -->
    <!-- SEO: Estos meta tags se sobrescriben dinámicamente por applySEO() -->
    <meta name="author" content="My Store" />
    <meta name="description" content="Welcome to our online store. Browse our catalog of products and enjoy exclusive benefits." />
    <meta name="keywords" content="online store, e-commerce, products, catalog" />
    
    <!-- Geo Tags — sobrescritos dinámicamente por SiteConfigContext -->
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="United States" />
    
    <!-- Structured Data: schemas dinámicos inyectados por applySEO() y SiteConfigContext -->
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Title dinámico — sobrescrito por applySEO() en cada navegación -->
    <title>My Store</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
