; ============================================================================
;  opcache.ini — Ajustes de OPcache para PRODUCCIÓN (PHP 8.4)
;
;  Se monta SOLO en docker-compose.prod.yml (en dev se deja el OPcache por
;  defecto, que revalida timestamps para recoger cambios de código en caliente).
;
;  ⚠ validate_timestamps=0: PHP NO comprueba mtime de los archivos, así que
;  cualquier cambio en mu-plugins/plugins/tema requiere REINICIAR el contenedor
;  de WordPress (o ejecutar `opcache_reset()`). Es el ajuste correcto para un
;  despliegue inmutable de producción: máximo rendimiento, cero stat() por hit.
; ============================================================================

opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=256
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.save_comments=1
opcache.fast_shutdown=1

; JIT (PHP 8.4) — acelera código intensivo en CPU.
opcache.jit=tracing
opcache.jit_buffer_size=64M

; Caché de rutas reales (menos syscalls en cada include).
realpath_cache_size=4096K
realpath_cache_ttl=600
