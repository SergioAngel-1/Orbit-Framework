# ============================================================================
#  Headless Web Ecosystem — Docker Compose (desarrollo)
#  Servicios:
#    - db        : MariaDB 11.8 LTS (persistencia en volumen nombrado)
#    - wordpress : WordPress 7.0 (PHP 8.4 + Apache) como Headless CMS -> :8080
#    - wpcli     : WP-CLI para automatizar la instalación/configuración
#    - redis     : Cache / rate-limit / idempotencia (BFF del frontend)
#    - frontend  : Next.js (App Router) en modo desarrollo            -> :3000
#
#  Para producción usa docker-compose.prod.yml
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Base de datos
  # --------------------------------------------------------------------------
  db:
    image: mariadb:11.8
    container_name: hwe_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_DATABASE: "${MYSQL_DATABASE:-wordpress}"
      MARIADB_USER: "${MYSQL_USER:-wordpress}"
      MARIADB_PASSWORD: "${MYSQL_PASSWORD:-wordpress}"
      MARIADB_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - hwe_net

  # --------------------------------------------------------------------------
  # WordPress (Headless CMS)
  # --------------------------------------------------------------------------
  wordpress:
    image: wordpress:7.0-php8.4-apache
    container_name: hwe_wordpress
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WORDPRESS_PORT:-8080}:80"
    environment:
      WORDPRESS_DB_HOST: "db:3306"
      WORDPRESS_DB_USER: "${MYSQL_USER:-wordpress}"
      WORDPRESS_DB_PASSWORD: "${MYSQL_PASSWORD:-wordpress}"
      WORDPRESS_DB_NAME: "${MYSQL_DATABASE:-wordpress}"
      WORDPRESS_DEBUG: "${WORDPRESS_DEBUG:-1}"
      # Inyecta PHP directamente en wp-config.php (clave JWT, entorno, etc.)
      WORDPRESS_CONFIG_EXTRA: |
        define( 'GRAPHQL_JWT_AUTH_SECRET_KEY', '${GRAPHQL_JWT_AUTH_SECRET_KEY:-changeme-super-secret-jwt-key}' );
        define( 'WP_ENVIRONMENT_TYPE', '${WP_ENVIRONMENT_TYPE:-local}' );
        define( 'HEADLESS_FRONTEND_URL', '${HEADLESS_FRONTEND_URL:-http://localhost:3000}' );
        define( 'HEADLESS_ALLOWED_ORIGINS', '${HEADLESS_ALLOWED_ORIGINS:-http://localhost:3000}' );
        define( 'HWE_REVALIDATION_SECRET', '${HWE_REVALIDATION_SECRET:-changeme-hwe-revalidation-secret}' );
        define( 'WP_REDIS_HOST', 'redis' );
        define( 'WP_REDIS_PORT', 6379 );
        define( 'WP_CACHE', true );
        define( 'HWE_TRUSTED_PROXY_COUNT', ${TRUSTED_PROXY_COUNT:-1} );
        if ( ! defined( 'WP_DEBUG_LOG' ) ) { define( 'WP_DEBUG_LOG', true ); }
    healthcheck:
      # Endpoint ligero (categorías con 1 post) en lugar de /wp-json/ que devuelve >1MB con WooCommerce
      test: ["CMD-SHELL", "curl -sf -o /dev/null http://localhost/wp-json/wp/v2/categories?per_page=1 || exit 1"]
      interval: 30s
      timeout: 15s
      start_period: 120s
      retries: 6
    volumes:
      - wordpress_core:/var/www/html
      # Volumen para wp-content completo (plugins, themes, uploads) — empieza limpio
      # en cada deploy, sin arrastrar basura del host.
      - wordpress_content:/var/www/html/wp-content
      # mu-plugins es código versionado, se monta desde el host (SOBREESCRIBE el
      # directorio dentro del volumen wordpress_content, que se inicializa con
      # el contenido default de la imagen de WordPress).
      - ./backend/wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./backend/config/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    networks:
      - hwe_net

  # --------------------------------------------------------------------------
  # WP-CLI (automatización: instala WP + plugins + configuración headless)
  # --------------------------------------------------------------------------
  wpcli:
    image: wordpress:cli-php8.4
    container_name: hwe_wpcli
    profiles: ["cli"]
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_started
    user: "33:33" # www-data, mismo UID que el contenedor de WordPress
    environment:
      WORDPRESS_DB_HOST: "db:3306"
      WORDPRESS_DB_USER: "${MYSQL_USER:-wordpress}"
      WORDPRESS_DB_PASSWORD: "${MYSQL_PASSWORD:-wordpress}"
      WORDPRESS_DB_NAME: "${MYSQL_DATABASE:-wordpress}"
      WP_URL: "${WORDPRESS_PUBLIC_URL:-http://localhost:8080}"
      WP_TITLE: "${WP_TITLE:-Headless Web Ecosystem}"
      WP_ADMIN_USER: "${WP_ADMIN_USER:-admin}"
      WP_ADMIN_PASSWORD: "${WP_ADMIN_PASSWORD:-admin}"
      WP_ADMIN_EMAIL: "${WP_ADMIN_EMAIL:-admin@example.com}"
      HEADLESS_FRONTEND_URL: "${HEADLESS_FRONTEND_URL:-http://frontend:3000}"
      WC_WEBHOOK_SECRET: "${WC_WEBHOOK_SECRET:-}"
    volumes:
      - wordpress_core:/var/www/html
      - wordpress_content:/var/www/html/wp-content
      - ./backend/wp-content/mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./backend/scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: ["/scripts/setup.sh"]
    networks:
      - hwe_net

  # --------------------------------------------------------------------------
  # Redis (cache / rate-limit / idempotencia para el BFF del frontend)
  # --------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: hwe_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - hwe_net

  # --------------------------------------------------------------------------
  # Frontend (Next.js — App Router — desarrollo)
  # --------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev # imagen de desarrollo con hot-reload (prod: --target prod)
    container_name: hwe_frontend
    restart: unless-stopped
    depends_on:
      wordpress:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    healthcheck:
      # Usa el fetch global de Node 24 (sin curl/wget) contra la sonda /api/health.
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 40s
      retries: 3
    environment:
      # El navegador del usuario llama a WP por su URL pública...
      NEXT_PUBLIC_WORDPRESS_API_URL: "${NEXT_PUBLIC_WORDPRESS_API_URL:-http://localhost:8080/graphql}"
      # ...pero el servidor Next (SSR/ISR) lo resuelve por la red interna de Docker.
      WORDPRESS_INTERNAL_API_URL: "${WORDPRESS_INTERNAL_API_URL:-http://wordpress:80/graphql}"
      # Origen autorizado para CSRF / verificación de Origin (Fases 1 y 4).
      ALLOWED_ORIGIN: "${ALLOWED_ORIGIN:-http://localhost:3000}"
      # Secreto JWT compartido con WordPress: el frontend verifica la firma
      # de los tokens localmente (server-only, sin prefijo NEXT_PUBLIC_).
      GRAPHQL_JWT_AUTH_SECRET_KEY: "${GRAPHQL_JWT_AUTH_SECRET_KEY:-changeme-super-secret-jwt-key}"
      # Secreto para firmar los tokens CSRF (signed double-submit).
      CSRF_SECRET: "${CSRF_SECRET:-changeme-super-secret-csrf-key}"
      # WooCommerce: APIs resueltas por la red interna de Docker.
      WC_API_URL: "${WC_API_URL:-http://wordpress:80/wp-json/wc/v3}"
      WC_STORE_API_URL: "${WC_STORE_API_URL:-http://wordpress:80/wp-json/wc/store/v1}"
      # Credenciales ck/cs SOLO de servidor (genéralas con generate-woo-keys.sh).
      WC_CONSUMER_KEY: "${WC_CONSUMER_KEY:-}"
      WC_CONSUMER_SECRET: "${WC_CONSUMER_SECRET:-}"
      # Secreto del webhook de WooCommerce (revalidación on-demand del catálogo).
      WC_WEBHOOK_SECRET: "${WC_WEBHOOK_SECRET:-changeme-super-secret-webhook-key}"
      # Secreto para que el plugin HWE Control Center dispare revalidación de site-config.
      HWE_REVALIDATION_SECRET: "${HWE_REVALIDATION_SECRET:-changeme-hwe-revalidation-secret}"
      # Conexión a Redis por la red interna de Docker.
      REDIS_URL: "${REDIS_URL:-redis://redis:6379}"
      WATCHPACK_POLLING: "true" # hot-reload fiable en volúmenes montados (Windows/WSL)
    volumes:
      - ./frontend:/app
      - /app/node_modules # node_modules aislado del host
      - /app/.next
    networks:
      - hwe_net

# ----------------------------------------------------------------------------
# Volúmenes y red
# ----------------------------------------------------------------------------
volumes:
  db_data:
    driver: local
  redis_data:
    driver: local
  wordpress_core:
    driver: local
  wordpress_content:
    driver: local

networks:
  hwe_net:
    driver: bridge
