name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas del mismo ref para ahorrar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Calidad del frontend: tipos + lint + tests + build de producción.
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend (lint · types · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Formato (Prettier)
        run: npm run format:check

      - name: Tests unitarios
        run: npm run test

      - name: Cobertura
        run: npm run test:coverage

      - name: Build de producción
        run: npm run build
        env:
          # El build usa los fallbacks de desarrollo; ningún secreto real es
          # necesario para compilar (las llamadas a WP/WC ocurren en runtime).
          NEXT_PUBLIC_WORDPRESS_API_URL: http://localhost:8080/graphql

  # --------------------------------------------------------------------------
  # Secret scanning: ningún secreto debe entrar al repositorio.
  # --------------------------------------------------------------------------
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # La validación de secretos en producción (secret-guard.ts, §9 del AGENTS)
      # exige estos valores; se pasan dummy porque en CI no hay WP ni Redis reales.
      NEXT_PUBLIC_WORDPRESS_API_URL: http://localhost:8080/graphql
      GRAPHQL_JWT_AUTH_SECRET_KEY: dummy-ci-jwt-secret-key-at-least-24-chars
      CSRF_SECRET: dummy-ci-csrf-secret-at-least-24-characters-len
      WC_WEBHOOK_SECRET: dummy-ci-webhook-secret-at-least-24-characters
      HWE_REVALIDATION_SECRET: dummy-ci-revalidation-secret-24-chars
      WC_CONSUMER_KEY: ck_dummy_ci_key
      WC_CONSUMER_SECRET: cs_dummy_ci_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium
      - name: Build de producción
        run: npm run build
      - name: Arrancar servidor
        run: npx next start --port 3000 &
      - name: Esperar servidor listo
        run: npx wait-on http://localhost:3000/api/health/live --timeout 60000
      - name: Tests e2e
        run: npx playwright test
      - name: Subir report HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # --------------------------------------------------------------------------
  # Validación de configuración de infraestructura: detecta YAML/Caddyfile
  # roto o truncado y errores de sintaxis en los scripts de shell ANTES de
  # llegar a producción (guard anti-corrupción de archivos de config).
  # --------------------------------------------------------------------------
  config:
    name: Config (Compose · Caddy · scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validar docker-compose (dev)
        run: docker compose -f docker-compose.yml config --quiet

      - name: Validar docker-compose (prod)
        env:
          PUBLIC_DOMAIN: example.com
          ACME_EMAIL: admin@example.com
          MYSQL_PASSWORD: dummy-validation-value
          MYSQL_ROOT_PASSWORD: dummy-validation-value
          GRAPHQL_JWT_AUTH_SECRET_KEY: dummy-validation-value
          HWE_REVALIDATION_SECRET: dummy-validation-value
          CSRF_SECRET: dummy-validation-value
          HWE_SECRETS_KEY: dummy-validation-value
          HWE_2FA_KEY: dummy-validation-value
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Validar Caddyfile
        run: |
          docker run --rm -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" caddy:2.9-alpine \
            caddy validate --adapter caddyfile --config /etc/caddy/Caddyfile

      - name: Sintaxis de scripts de shell
        run: |
          for f in backend/scripts/*.sh; do
            echo "· $f"
            sh -n "$f"
          done
