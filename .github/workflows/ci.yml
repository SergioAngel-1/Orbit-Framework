name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancela ejecuciones antiguas del mismo ref para ahorrar minutos.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --------------------------------------------------------------------------
  # Calidad del frontend: tipos + lint + tests + build de producción.
  # --------------------------------------------------------------------------
  frontend:
    name: Frontend (lint · types · test · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Formato (Prettier)
        run: npm run format:check

      - name: Tests unitarios
        run: npm run test

      - name: Build de producción
        run: npm run build
        env:
          # El build usa los fallbacks de desarrollo; ningún secreto real es
          # necesario para compilar (las llamadas a WP/WC ocurren en runtime).
          NEXT_PUBLIC_WORDPRESS_API_URL: http://localhost:8080/graphql

  # --------------------------------------------------------------------------
  # Secret scanning: ningún secreto debe entrar al repositorio.
  # --------------------------------------------------------------------------
  secret-scan:
    name: Secret scanning (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: E2E (Playwright)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalar dependencias
        run: npm ci
      - name: Instalar navegadores Playwright
        run: npx playwright install --with-deps chromium
      - name: Arrancar servidor
        run: npx next start --port 3000 &
        env:
          NEXT_PUBLIC_WORDPRESS_API_URL: http://localhost:8080/graphql
      - name: Esperar servidor listo
        run: npx wait-on http://localhost:3000/api/health --timeout 30000
      - name: Tests e2e
        run: npx playwright test
      - name: Subir report HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
