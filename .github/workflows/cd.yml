name: CD

# ============================================================================
#  Despliegue continuo (CD).
#
#  Modelo: imagen del frontend → GHCR; despliegue por SSH al host de la pila
#  Docker Compose de producción (`docker-compose.prod.yml`).
#
#  Disparadores:
#    - Tag `v*`           → build + push + deploy a staging + (aprobación) prod.
#    - workflow_dispatch  → elige entorno (staging | production) a mano.
#
#  Gates: los entornos `staging` y `production` de GitHub (Settings →
#  Environments) aportan la APROBACIÓN MANUAL y los secretos por entorno.
#  Configura "Required reviewers" en `production` para el promote manual.
#
#  Secretos esperados (por entorno): DEPLOY_SSH_HOST, DEPLOY_SSH_USER,
#  DEPLOY_SSH_KEY, DEPLOY_PATH. Variables: STAGING_URL / PRODUCTION_URL.
#  Si no están configurados, el job avisa y omite el deploy real (no rompe).
# ============================================================================

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Entorno destino"
        type: choice
        options: [staging, production]
        default: staging

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  # --------------------------------------------------------------------------
  #  Construye la imagen standalone del frontend (target `prod`) y la publica.
  # --------------------------------------------------------------------------
  build-push:
    name: Build & push imagen (GHCR)
    runs-on: ubuntu-latest
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Login en GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolver tag de imagen
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="manual-$(git rev-parse --short HEAD)"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: prod
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  #  Despliegue a STAGING (automático tras el build en tags; o por dispatch).
  # --------------------------------------------------------------------------
  deploy-staging:
    name: Deploy a staging
    needs: build-push
    if: ${{ github.event_name == 'push' || inputs.environment == 'staging' }}
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Comprobar secretos de despliegue
        id: guard
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_HOST }}" ]; then
            echo "::warning::Secretos de despliegue (DEPLOY_SSH_*) no configurados en el entorno 'staging'; se omite el deploy real."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Desplegar (SSH → docker compose pull + up)
        if: steps.guard.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export FRONTEND_IMAGE="${{ needs.build-push.outputs.image_ref }}"
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull frontend
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d frontend
            docker image prune -f

      - name: Smoke check readiness
        if: steps.guard.outputs.skip != 'true' && vars.STAGING_URL != ''
        run: |
          curl -fsS "${{ vars.STAGING_URL }}/api/health?ready=1" >/dev/null && echo "staging OK"

  # --------------------------------------------------------------------------
  #  Promote a PRODUCCIÓN: requiere aprobación manual (entorno `production`).
  # --------------------------------------------------------------------------
  deploy-production:
    name: Deploy a producción (aprobación manual)
    needs: [build-push, deploy-staging]
    if: ${{ startsWith(github.ref, 'refs/tags/v') || inputs.environment == 'production' }}
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Comprobar secretos de despliegue
        id: guard
        run: |
          if [ -z "${{ secrets.DEPLOY_SSH_HOST }}" ]; then
            echo "::warning::Secretos de despliegue (DEPLOY_SSH_*) no configurados en el entorno 'production'; se omite el deploy real."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Desplegar (SSH → docker compose pull + up)
        if: steps.guard.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            export FRONTEND_IMAGE="${{ needs.build-push.outputs.image_ref }}"
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull frontend
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d frontend
            docker image prune -f

      - name: Smoke check readiness
        if: steps.guard.outputs.skip != 'true' && vars.PRODUCTION_URL != ''
        run: |
          curl -fsS "${{ vars.PRODUCTION_URL }}/api/health?ready=1" >/dev/null && echo "producción OK"
